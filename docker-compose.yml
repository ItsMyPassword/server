services:
  app:
    build: .
    image: itsmypassword-server:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /data/itsmypassword.db
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - data:/data
    expose:
      - "8080"
    networks: [edge]
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

volumes:
  data:
  caddy_data:
  caddy_config:

networks:
  edge:
